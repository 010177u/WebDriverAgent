# 自定义工作流: 编译 WDA 并处理好签名，适配巨魔 TrollStore 安装
name: Build WDA for TrollStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.3"

      - name: Build WebDriverAgent for real device
        run: |
          xcodebuild -version
          
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS="arm64 arm64e" \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tail -30
          
          echo "=== Build products ==="
          find ./DerivedData -name "*.app" -type d
          find ./DerivedData -name "*.xctest" -type d

      - name: Fix binaries for TrollStore ldid compatibility
        run: |
          APP_PATH=$(find ./DerivedData -name "WebDriverAgentRunner-Runner.app" -path "*/Debug-iphoneos/*" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ./DerivedData -name "*.app" -path "*/iphoneos/*" -type d | head -1)
          fi
          
          echo "App path: $APP_PATH"
          
          # 安装 ldid (和 TrollStore 用同样的工具)
          brew install ldid
          
          echo "=== Scanning all Mach-O files ==="
          find "$APP_PATH" -type f | while read f; do
            filetype=$(file "$f" 2>/dev/null)
            if echo "$filetype" | grep -q "Mach-O"; then
              echo "  $f"
              echo "    -> $filetype"
              
              # 用 lipo 确保只有 arm64 (移除 arm64e 避免兼容问题)
              archs=$(lipo -archs "$f" 2>/dev/null || echo "unknown")
              echo "    -> archs: $archs"
              
              if echo "$archs" | grep -q "arm64e"; then
                echo "    -> Extracting arm64 only..."
                lipo "$f" -extract arm64 -output "${f}.arm64" 2>/dev/null && mv "${f}.arm64" "$f" || true
              fi
              
              # 测试 ldid 能否处理
              ldid -S "$f" 2>&1 || echo "    -> WARNING: ldid failed on this file"
            fi
          done
          
          echo ""
          echo "=== Checking for problematic file types ==="
          find "$APP_PATH" -type f -name "*.metallib" -o -name "*.car" | head -20
          
          # 删除 metallib 文件 (这些通常是 ldid 报错的元凶)
          find "$APP_PATH" -name "*.metallib" -delete -print 2>/dev/null || true
          
          echo ""
          echo "=== Final ldid signing test ==="
          ldid -S "$APP_PATH" 2>&1 && echo "ldid signing OK!" || echo "ldid signing has issues"

      - name: Package IPA
        run: |
          APP_PATH=$(find ./DerivedData -name "WebDriverAgentRunner-Runner.app" -path "*/Debug-iphoneos/*" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ./DerivedData -name "*.app" -path "*/iphoneos/*" -type d | head -1)
          fi
          
          echo "Packaging: $APP_PATH"
          
          # 获取 Bundle ID
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          echo "Bundle ID: $BUNDLE_ID"
          
          # 确保 xctest 插件也在里面
          XCTEST_PATH=$(find ./DerivedData -name "WebDriverAgentRunner.xctest" -path "*/Debug-iphoneos/*" -type d | head -1)
          if [ -n "$XCTEST_PATH" ]; then
            PLUGINS_DIR="$APP_PATH/PlugIns"
            mkdir -p "$PLUGINS_DIR"
            if [ ! -d "$PLUGINS_DIR/WebDriverAgentRunner.xctest" ]; then
              cp -r "$XCTEST_PATH" "$PLUGINS_DIR/"
              echo "Added xctest plugin"
            fi
            # 签名 xctest 内的二进制
            find "$PLUGINS_DIR" -type f | while read f; do
              if file "$f" | grep -q "Mach-O"; then
                ldid -S "$f" 2>/dev/null || true
              fi
            done
          fi
          
          # 创建 IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r WebDriverAgent.ipa Payload/
          
          echo "=== IPA Info ==="
          echo "Bundle ID: $BUNDLE_ID"
          ls -la WebDriverAgent.ipa
          echo "IPA created successfully!"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-TrollStore-IPA
          path: WebDriverAgent.ipa
          retention-days: 90
