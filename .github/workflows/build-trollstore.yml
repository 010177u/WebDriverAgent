# 自定义工作流: 编译 WDA 并彻底修复 ldid 兼容性，适配巨魔 TrollStore
name: Build WDA for TrollStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.3"

      - name: Build WebDriverAgent for real device
        run: |
          xcodebuild -version
          
          # 只编译 arm64 (不编译 arm64e，避免兼容问题)
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tail -30
          
          echo "=== Build products ==="
          find ./DerivedData -name "*.app" -type d
          find ./DerivedData -name "*.xctest" -type d

      - name: Analyze and fix Mach-O files for TrollStore
        run: |
          brew install ldid
          
          APP_PATH=$(find ./DerivedData -name "WebDriverAgentRunner-Runner.app" -path "*/Debug-iphoneos/*" -type d | head -1)
          echo "App path: $APP_PATH"
          
          echo ""
          echo "=========================================="
          echo "=== STEP 1: List ALL files in .app ==="
          echo "=========================================="
          find "$APP_PATH" -type f | sort
          
          echo ""
          echo "=========================================="
          echo "=== STEP 2: Identify ALL Mach-O files ==="
          echo "=========================================="
          find "$APP_PATH" -type f | while read f; do
            ftype=$(file -b "$f" 2>/dev/null)
            if echo "$ftype" | grep -qi "Mach-O\|Mach-o"; then
              # 获取详细 Mach-O header 信息
              echo ""
              echo "FILE: $f"
              echo "  file: $ftype"
              archs=$(lipo -archs "$f" 2>/dev/null || echo "n/a")
              echo "  archs: $archs"
              otool -hv "$f" 2>/dev/null | grep -A2 "MH_" | head -5
            fi
          done
          
          echo ""
          echo "=========================================="
          echo "=== STEP 3: Test ldid on each file ==="
          echo "=========================================="
          FAILED_FILES=""
          find "$APP_PATH" -type f | while read f; do
            ftype=$(file -b "$f" 2>/dev/null)
            if echo "$ftype" | grep -qi "Mach-O\|Mach-o"; then
              result=$(ldid -S "$f" 2>&1)
              status=$?
              if [ $status -ne 0 ]; then
                echo "FAILED: $f"
                echo "  error: $result"
                echo "  file type: $ftype"
                # 删除无法签名的文件
                echo "  -> REMOVING problematic file"
                rm -f "$f"
              else
                echo "OK: $(basename $f)"
              fi
            fi
          done
          
          echo ""
          echo "=========================================="
          echo "=== STEP 4: Remove known problematic files ==="
          echo "=========================================="
          # 删除 metallib (Metal shader libraries - Mach-O headers but not real executables)
          find "$APP_PATH" -name "*.metallib" -delete -print 2>/dev/null || true
          # 删除 .car (compiled asset catalogs - 有时包含 Mach-O)
          # 注意: 不删 .car，因为可能需要
          # 删除 .o 目标文件
          find "$APP_PATH" -name "*.o" -delete -print 2>/dev/null || true
          # 删除 .a 静态库
          find "$APP_PATH" -name "*.a" -delete -print 2>/dev/null || true
          
          echo ""
          echo "=========================================="
          echo "=== STEP 5: Final ldid -s test ==="
          echo "=========================================="
          ldid -s "$APP_PATH" 2>&1
          LDID_STATUS=$?
          echo "ldid -s exit code: $LDID_STATUS"
          
          if [ $LDID_STATUS -ne 0 ]; then
            echo ""
            echo "ldid -s still fails. Trying to find remaining problematic files..."
            echo ""
            # 二分查找: 对每个子目录单独测试
            for dir in "$APP_PATH" "$APP_PATH"/PlugIns/* "$APP_PATH"/Frameworks/*; do
              if [ -d "$dir" ]; then
                ldid -s "$dir" 2>&1
                status=$?
                if [ $status -ne 0 ]; then
                  echo "PROBLEMATIC DIR: $dir"
                  # 逐个文件测试
                  find "$dir" -type f | while read f; do
                    ftype=$(file -b "$f" 2>/dev/null)
                    if echo "$ftype" | grep -qi "Mach-O"; then
                      ldid -S "$f" 2>&1
                      s=$?
                      if [ $s -ne 0 ]; then
                        echo "  PROBLEM FILE: $f"
                        echo "  TYPE: $ftype"
                        echo "  Mach-O header:"
                        otool -hv "$f" 2>/dev/null | head -10
                        echo "  -> REMOVING"
                        rm -f "$f"
                      fi
                    fi
                  done
                fi
              fi
            done
            
            echo ""
            echo "=== Retry ldid -s after cleanup ==="
            ldid -s "$APP_PATH" 2>&1
            echo "Final ldid exit: $?"
          fi

      - name: Package IPA
        run: |
          APP_PATH=$(find ./DerivedData -name "WebDriverAgentRunner-Runner.app" -path "*/Debug-iphoneos/*" -type d | head -1)
          echo "Packaging: $APP_PATH"
          
          # 获取 Bundle ID
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist")
          echo "Bundle ID: $BUNDLE_ID"
          
          # 确保 xctest 插件在里面
          XCTEST_PATH=$(find ./DerivedData -name "WebDriverAgentRunner.xctest" -path "*/Debug-iphoneos/*" -type d | head -1)
          if [ -n "$XCTEST_PATH" ]; then
            PLUGINS_DIR="$APP_PATH/PlugIns"
            mkdir -p "$PLUGINS_DIR"
            if [ ! -d "$PLUGINS_DIR/WebDriverAgentRunner.xctest" ]; then
              cp -r "$XCTEST_PATH" "$PLUGINS_DIR/"
              echo "Added xctest plugin"
            fi
          fi
          
          # 最终用 codesign 做 ad-hoc 签名 (比 ldid 更兼容)
          codesign --force --deep --sign - "$APP_PATH" 2>&1 || true
          
          # 创建 IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r WebDriverAgent.ipa Payload/
          
          echo "=== IPA Info ==="
          echo "Bundle ID: $BUNDLE_ID"
          ls -la WebDriverAgent.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-TrollStore-IPA
          path: WebDriverAgent.ipa
          retention-days: 90
